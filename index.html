<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Timer Pro (BG Fix)</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f4f8; padding: 20px; color: #1a202c; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        .input-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        input { width: 80px; padding: 15px; font-size: 1.5rem; border-radius: 12px; border: 2px solid #edf2f7; text-align: center; }
        button { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: 700; border-radius: 16px; border: none; cursor: pointer; }
        .start-btn { background: #48bb78; color: white; }
        .stop-btn { background: #f56565; color: white; }
        #status { margin-top: 25px; font-size: 2.2rem; font-weight: 800; font-family: monospace; }
        .hint { font-size: 0.8rem; color: #a0aec0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>⚡ EV Timer</h1>
    <div class="input-group">
        <input type="number" id="hours" value="0" placeholder="H">
        <input type="number" id="minutes" value="30" placeholder="M">
    </div>
    <button id="actionBtn" class="start-btn" onclick="toggleTimer()">Start Charging</button>
    <div id="status">00:00:00</div>
    <p class="hint">Timer works even if you lock your screen.</p>
</div>

<audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

<script>
    let timerInterval;
    let targetTime; // The exact timestamp when charging should finish

    function toggleTimer() {
        const btn = document.getElementById('actionBtn');
        const h = parseInt(document.getElementById('hours').value) || 0;
        const m = parseInt(document.getElementById('minutes').value) || 0;
        
        if (btn.innerText === "Start Charging") {
            const totalMs = ((h * 3600) + (m * 60)) * 1000;
            if (totalMs <= 0) return;

            // FIX: Set a fixed end time in the future
            targetTime = Date.now() + totalMs;
            localStorage.setItem('ev_target_time', targetTime);
            
            startLogic();
        } else {
            stopLogic();
        }
    }

    function startLogic() {
        const btn = document.getElementById('actionBtn');
        btn.innerText = "Stop / Reset";
        btn.className = "stop-btn";
        
        // Update display every second
        timerInterval = setInterval(updateDisplay, 1000);
        updateDisplay(); 
    }

    function updateDisplay() {
        const now = Date.now();
        const savedTarget = localStorage.getItem('ev_target_time');
        if (!savedTarget) return;

        const diff = savedTarget - now;

        if (diff <= 0) {
            document.getElementById('status').innerText = "00:00:00";
            document.getElementById('status').style.color = "#f56565";
            document.getElementById('alarmSound').play();
            clearInterval(timerInterval);
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById('status').innerText = 
            `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function stopLogic() {
        clearInterval(timerInterval);
        localStorage.removeItem('ev_target_time');
        document.getElementById('actionBtn').innerText = "Start Charging";
        document.getElementById('actionBtn').className = "start-btn";
        document.getElementById('status').innerText = "00:00:00";
        document.getElementById('status').style.color = "#1a202c";
        document.getElementById('alarmSound').pause();
        document.getElementById('alarmSound').currentTime = 0;
    }

    // Auto-resume if the user comes back to the app
    window.onload = () => {
        if (localStorage.getItem('ev_target_time')) {
            startLogic();
        }
    };
</script>
</body>
</html>
